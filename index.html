<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>
                <svg class="icon icon-wallet" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M3 9h14a2 2 0 0 1 2 2v1h-4a2 2 0 1 0 0 4h4v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <circle cx="16" cy="13" r="0.9" fill="currentColor"/>
                </svg>Expense Tracker Pro
            </h1>
            <div class="header-actions">
                <input type="text" placeholder="Search transactions..." id="search">
                <button id="theme-btn">
                    <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Dashboard -->
        <section class="dashboard">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="balance">₹0.00</h2>
            </div>
            <div class="card income-card">
                <h3>Income</h3>
                <h2 id="income">₹0.00</h2>
            </div>
            <div class="card expense-card">
                <h3>Expense</h3>
                <h2 id="expense">₹0.00</h2>
            </div>
        </section>

        <!-- Add Transaction -->
        <section class="add-transaction">
            <h2>
                <svg class="icon icon-plus" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                Add Transaction</h2>

            <form id="transaction-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input
                    type="text"
                    id="title"
                    placeholder="Enter title"
                    required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number"
                    id="amount"
                    placeholder="Enter amount"
                    min="1"
                    required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="">Select Category</option>
                        <option value="food">Food</option>
                        <option value="travel">Travel</option>
                        <option value="shopping">Shopping</option>
                        <option value="bills">Bills</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="salary">Salary</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type">
                        <option value="">Select Type</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date">
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn" id="submit-btn">Add Transaction</button>
                    <button type="button" class="btn btn-cancel" id="cancel-btn" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>

        <!-- Filters -->
        <section class="filters">
            <select id="filter-type">
                <option value="all">All Transactions</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <select id="filter-category">
                <option value="all">All Categories</option>
                <option value="food">Food</option>
                <option value="travel">Travel</option>
                <option value="shopping">Shopping</option>
                <option value="bills">Bills</option>
                <option value="entertainment">Entertainment</option>
                <option value="salary">Salary</option>
                <option value="other">Other</option>
            </select>
            <select id="sort-transactions">
                <option value="latest">Latest First</option>
                <option value="highest">Highest Amount</option>
                <option value="oldest">Oldest First</option>
                <option value="lowest">Lowest Amount</option>
            </select>

            <input type="month" id="filter-month">
        </section>

        <!-- Transaction History -->
        <section class="history">
            <h2>Transaction History</h2>
            <div id="transaction-list" class="history-list">
                <div class="empty-state">
                    <svg class="icon icon-empty" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <path d="M3 9h14a2 2 0 0 1 2 2v1h-4a2 2 0 1 0 0 4h4v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        <circle cx="16" cy="13" r="0.8" fill="currentColor"/>
                    </svg>
                    <p>No transactions yet</p>
                </div>
            </div>
        </section>

        <!-- Charts -->
        <section class="charts">
            <h2>Analytics</h2>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Monthly Income & Expense Analysis</h3>
                <canvas id="monthlyChart"></canvas>
            </div>
        </section>

    </div>
    <footer>
    <p>© 2026 Expense Tracker Pro | Built with HTML, CSS & JavaScript
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
